<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#05080a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#03e6a6"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="4"/>

  <!-- keyboard body -->
  <rect x="92" y="170" width="328" height="172" rx="26" fill="#0a0f13" stroke="#1b2128" stroke-width="3"/>

  <!-- 4 RGB zones -->
  <g filter="url(#glow)">
    <rect x="108" y="186" width="70" height="140" rx="12" fill="#ff0050"/>
    <rect x="186" y="186" width="70" height="140" rx="12" fill="#b400ff"/>
    <rect x="256" y="186" width="70" height="140" rx="12" fill="#0078ff"/>
    <rect x="334" y="186" width="70" height="140" rx="12" fill="#00e6a6"/>
  </g>

  <!-- key dots -->
  <g fill="#04110d" fill-opacity="0.55">
    <g>
      <rect x="118" y="198" width="50" height="18" rx="5"/>
      <rect x="118" y="224" width="50" height="18" rx="5"/>
      <rect x="118" y="250" width="50" height="18" rx="5"/>
      <rect x="118" y="276" width="50" height="18" rx="5"/>
      <rect x="118" y="302" width="50" height="14" rx="5"/>
    </g>
    <g transform="translate(78,0)">
      <rect x="118" y="198" width="50" height="18" rx="5"/>
      <rect x="118" y="224" width="50" height="18" rx="5"/>
      <rect x="118" y="250" width="50" height="18" rx="5"/>
      <rect x="118" y="276" width="50" height="18" rx="5"/>
      <rect x="118" y="302" width="50" height="14" rx="5"/>
    </g>
    <g transform="translate(148,0)">
      <rect x="118" y="198" width="50" height="18" rx="5"/>
      <rect x="118" y="224" width="50" height="18" rx="5"/>
      <rect x="118" y="250" width="50" height="18" rx="5"/>
      <rect x="118" y="276" width="50" height="18" rx="5"/>
      <rect x="118" y="302" width="50" height="14" rx="5"/>
    </g>
    <g transform="translate(226,0)">
      <rect x="118" y="198" width="50" height="18" rx="5"/>
      <rect x="118" y="224" width="50" height="18" rx="5"/>
      <rect x="118" y="250" width="50" height="18" rx="5"/>
      <rect x="118" y="276" width="50" height="18" rx="5"/>
      <rect x="118" y="302" width="50" height="14" rx="5"/>
    </g>
  </g>
</svg>
